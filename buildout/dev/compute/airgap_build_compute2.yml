- name: VM setup
  gather_facts: false
  hosts: abi_compute
  become: true
  vars:
    install_src_dir: /mnt/install_src # path to the install source
    docker_tar: docker-29.4.0.tgz     # path to the tarball on the control node
    docker_compose_ver: v5.1.2        # 

  vars:
    install_src_dir: /mnt/install_src # path to the install source

  environment:

  tasks:

  #########################

  - name: Reset SSH connection to pick up group changes
    meta: reset_connection

  - name: Ensure COMPOSE_FILE is in .bash_aliases
    ansible.builtin.lineinfile:
      path: "~/.bashrc"
      regexp: '^export COMPOSE_FILE='
      line: "export COMPOSE_FILE=~/digitaltwins-compute/docker-compose.yml"
      create: true
      mode: '0600'  # Restrict permissions since it contains a secret

  - name: user access
    authorized_key:
      user: "{{ ansible_user }}"
      state: present
      key: "{{ lookup('file', item) }}"
    with_fileglob:
      - "{{ install_src_dir }}/data/public_keys/*.pub"

  - name: Ensure the keys directory is present
    ansible.builtin.file:
      path: keys
      state: directory
      mode: '0700'

  - name: Ensure the keys/public_keys directory is present
    ansible.builtin.file:
      path: keys/public_keys
      state: directory
      mode: '0700'

  - name: Copy public keys
    ansible.builtin.synchronize:
      src: "{{ install_src_dir }}/data/public_keys/"
      dest: "./keys/public_keys/"
      recursive: yes
      rsync_opts:
        - "--include=*.pub"
        - "--exclude=*"

  - name: Copy .env
    ansible.builtin.copy:
      src: "{{ install_src_dir }}/data/compute.env"
      dest: ./digitaltwins-compute/.env
      mode: '0600'

  - name: all down
    ansible.builtin.command: docker compose down
    args:
      chdir: ./digitaltwins-platform

  - name: Start docker compose services
    shell: |
      docker compose up -d
    args:
      chdir: ./digitaltwins-platform

    - name: Extract Docker binaries to /usr/local/bin
      ansible.builtin.unarchive:
        src: "{{ install_src_dir }}/{{ docker_tar }}"
        dest: /usr/local/bin
        extra_opts: ['--strip-components=1']
        remote_src: true

    - name: Create Docker CLI plugins directory
      ansible.builtin.file:
        path: /usr/local/lib/docker/cli-plugins
        state: directory
        mode: '0755'

    - name: Install Docker Compose plugin
      ansible.builtin.copy:
        src: "{{ install_src_dir }}/docker-compose-linux-x86_64-{{ docker_compose_ver }}"
        dest: /usr/local/lib/docker/cli-plugins/docker-compose
        mode: '0755'
        remote_src: true

    - name: Create docker group
      ansible.builtin.group:
        name: docker
        state: present

    - name: Add current user to docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Install docker.socket unit file
      ansible.builtin.copy:
        dest: /etc/systemd/system/docker.socket
        mode: '0644'
        content: |
          [Unit]
          Description=Docker Socket for the API

          [Socket]
          ListenStream=/var/run/docker.sock
          SocketMode=0660
          SocketUser=root
          SocketGroup=docker

          [Install]
          WantedBy=sockets.target

    - name: Install docker.service unit file
      ansible.builtin.copy:
        dest: /etc/systemd/system/docker.service
        mode: '0644'
        content: |
          [Unit]
          Description=Docker Application Container Engine
          Documentation=https://docs.docker.com
          After=network-online.target docker.socket
          Requires=docker.socket

          [Service]
          Type=notify
          ExecStart=/usr/local/bin/dockerd
          ExecReload=/bin/kill -s HUP $MAINPID
          Restart=always
          RestartSec=2
          StartLimitBurst=3
          StartLimitInterval=60s
          LimitNOFILE=infinity
          LimitNPROC=infinity
          LimitCORE=infinity
          TasksMax=infinity
          Delegate=yes
          KillMode=process

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd and enable Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started
        daemon_reload: true
