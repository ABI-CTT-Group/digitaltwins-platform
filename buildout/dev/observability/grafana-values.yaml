
service:
  type: NodePort
  port: 80
  targetPort: 3000
  nodePort: 30333

adminUser: admin
adminPassword: strongpassword

plugins: ""

assertNoLeakedSecrets: false

grafana.ini:
  server:
    root_url: http://130.216.216.116:30333/
    domain: 130.216.216.116
  auth.generic_oauth:
    enabled: true
    name: Keycloak
    allow_sign_up: true
    client_id: grafana
    client_secret: xxxxxxxx
    scopes: openid email profile roles
    email_attribute_path: email
    login_attribute_path: preferred_username
    name_attribute_path: full_name
    auth_url: https://130.216.216.243:8009/realms/digitaltwins/protocol/openid-connect/auth
    token_url: https://130.216.216.243:8009/realms/digitaltwins/protocol/openid-connect/token
    api_url: https://130.216.216.243:8009/realms/digitaltwins/protocol/openid-connect/userinfo
    role_attribute_path: contains(resource_access.grafana.roles[*], 'admin') && 'Admin' || contains(resource_access.grafana.roles[*], 'editor') && 'Editor' || contains(resource_access.grafana.roles[*], 'viewer') && 'Viewer'
persistence:
  enabled: true

initChownData:
  enabled: false

    
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: dititaltwins-log
        type: loki
        url: http://loki.loki.svc.cluster.local:3100
        access: proxy
        isDefault: true
      - name: dititaltwins-metric
        type: prometheus
        url: http://mimir-gateway.mimir.svc.cluster.local/prometheus
        access: proxy
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
    - name: 'metric'
      orgId: 1
      folder: 'Metric'
      type: file
      disableDeletion: false
      editable: true
      options:
        path: /var/lib/grafana/dashboards/metric
    - name: 'log'
      orgId: 1
      folder: 'Log'
      type: file
      disableDeletion: false
      editable: true
      options:
        path: /var/lib/grafana/dashboards/log

dashboardsConfigMaps:
  #metric: "docker-metric-dashboard1,docker-metric-dashboard2,docker-metric-dashboard2,vm-metric-dashboard"
  metric: "metric-dashboards"
  log: "log-dashboards"


