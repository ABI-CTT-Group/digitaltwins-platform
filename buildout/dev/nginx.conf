server {
    listen 8443 ssl;
    server_name test.digitaltwins.auckland.ac.nz;

    ssl_certificate /etc/nginx/certs/test.digitaltwins.auckland.ac.nz.crt;
    ssl_certificate_key /etc/nginx/certs/test.digitaltwins.auckland.ac.nz.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Rewrite oauth callback to Flask's actual route before FastAPI SPA catches it
    location /oauth-authorized/ {
        proxy_pass http://airflow-apiserver:8080/auth/oauth-authorized/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
    }

    location / {
        proxy_pass http://airflow-apiserver:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}

server {
    listen 80;
    server_name test.digitaltwins.auckland.ac.nz; # Replace with your actual domain
    return 301 https://$host$request_uri;
}



# for jupyter
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}


server {
    listen 443 ssl;
    server_name test.digitaltwins.auckland.ac.nz; # Replace with your actual domain
    # Standard buffer fix for large Keycloak headers
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;


    # Point to the certs you mounted in docker-compose.yml
    ssl_certificate /etc/nginx/certs/test.digitaltwins.auckland.ac.nz.crt; 
    ssl_certificate_key /etc/nginx/certs/test.digitaltwins.auckland.ac.nz.key;

    # Recommended security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Serve the React/Vue/Node frontend

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Route API calls internally to avoid Mixed Content blocks
    location /api/ {
        # 'portal-backend' is the internal Docker DNS name
        proxy_pass http://portal-backend:8000/api/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ... your existing SSL and /api/ config ...

    # Route /seek requests to the SEEK container
    location /seek/ {
        # 'seek' is the container name, 3000 is its internal port
        proxy_pass http://seek:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # This helps Rails know it's being accessed via HTTPS
        proxy_set_header X-Forwarded-Ssl on;
    }

location /jupyter/ {
    # Using a variable prevents Nginx from crashing on startup
    proxy_pass http://jupyterlab:8888/jupyter/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Jupyter needs these for the terminal and kernel to work
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_read_timeout 86400;
}

location /airflow/ {
    # No trailing slash on proxy_pass — nginx passes the full /airflow/... path
    # to airflow-apiserver. Airflow knows it's at /airflow/ via BASE_URL and
    # handles the prefix itself (base href, static assets, API routes, all correct).
    proxy_pass http://airflow-apiserver:8080;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;

    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
}

location /auth/ {
    proxy_pass http://keycloak:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    
    # CRITICAL: These MUST match what KC_PROXY_HEADERS expects
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;

    # Keycloak 24+ cookie fix for subpaths
    #proxy_cookie_path /auth/ "/auth/; Secure; SameSite=None";
    proxy_cookie_path / "/auth/; Secure; SameSite=None";
}


location /grafana/ {

    proxy_pass http://172.17.0.1:81/grafana/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}


}
