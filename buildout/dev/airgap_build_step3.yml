# Before running this playbook, source secrets.env to load all secrets and
# deployment config into the environment:
#
#   source /mnt/install_src/data/secrets.env
#   source /mnt/install_src/data/env
#   ansible-playbook -i inventory airgap_build_step3.yml
#
# secrets.env contains all passwords, keys, and tokens.
# env contains the deployment-specific config (PLATFORM_DOMAIN, PLATFORM_PROTOCOL).
# Neither file is in git or clean_src.

- name: VM setup
  gather_facts: false
  hosts: all

  vars:
    install_src_dir: /mnt/install_src  # path to the install source
    platform_dir: ~/digitaltwins-platform  # installation target directory
    keys_dir: ~/keys                       # where keys/realm export are kept

  environment:

  tasks:

  #########################
  # Make sure required env variables are set
  - name: Verify SEEK_ADMIN_PASSWORD environment variable is set
    ansible.builtin.fail:
      msg: "FATAL: The required environment variable SEEK_ADMIN_PASSWORD must be set to run this playbook."
    when: lookup('env', 'SEEK_ADMIN_PASSWORD') | length == 0

  - name: Verify MYSQL_ROOT_PASSWORD environment variable is set
    ansible.builtin.fail:
      msg: "FATAL: The required environment variable MYSQL_ROOT_PASSWORD must be set to run this playbook."
    when: lookup('env', 'MYSQL_ROOT_PASSWORD') | length == 0

  - name: Verify MYSQL_PASSWORD environment variable is set
    ansible.builtin.fail:
      msg: "FATAL: The required environment variable MYSQL_PASSWORD must be set to run this playbook."
    when: lookup('env', 'MYSQL_PASSWORD') | length == 0

  - name: Verify PLATFORM_DOMAIN environment variable is set
    ansible.builtin.fail:
      msg: "FATAL: The required environment variable PLATFORM_DOMAIN must be set to run this playbook."
    when: lookup('env', 'PLATFORM_DOMAIN') | length == 0
  #########################

  - name: Reset SSH connection to pick up group changes
    meta: reset_connection

  - name: Ensure COMPOSE_FILE is in .bash_aliases
    ansible.builtin.lineinfile:
      path: "~/.bashrc"
      regexp: '^export COMPOSE_FILE='
      line: "export COMPOSE_FILE={{ platform_dir }}/docker-compose.yml"
      create: true
      mode: '0600'  # Restrict permissions since it contains a secret

  - name: user access
    authorized_key:
      user: "{{ ansible_user }}"
      state: present
      key: "{{ lookup('file', item) }}"
    with_fileglob:
      - "{{ install_src_dir }}/data/public_keys/*.pub"

  - name: Ensure the keys directory is present
    ansible.builtin.file:
      path: "{{ keys_dir }}"
      state: directory
      mode: '0700'

  - name: Ensure the keys/public_keys directory is present
    ansible.builtin.file:
      path: "{{ keys_dir }}/public_keys"
      state: directory
      mode: '0700'

  - name: Copy public keys
    ansible.builtin.synchronize:
      src: "{{ install_src_dir }}/data/public_keys/"
      dest: "{{ keys_dir }}/public_keys/"
      recursive: yes
      rsync_opts:
        - "--include=*.pub"
        - "--exclude=*"

#  DEPRECATED!
#  - name: Copy public pem to keys
#    ansible.builtin.synchronize:
#      src: "{{ install_src_dir }}/DigitalTwinsKeycloakInternalCA.pem"
#      dest: "./keys/DigitalTwinsKeycloakInternalCA.pem"

# Because git pulling has basically stopped functioning in the last couple days...
  - name: Sync code to VM
    ansible.posix.synchronize:
      src: "{{ install_src_dir }}/clean_src/digitaltwins-platform/"
      dest: "{{ platform_dir }}/"
      archive: yes
      delete: yes
      rsync_opts:
        - '--exclude=.git/'
        - '--exclude=.env'

  - name: Create certs directory
    ansible.builtin.file:
      path: "{{ platform_dir }}/services/portal/DigitalTWINS-Portal/certs"
      state: directory
      mode: '0755'

  - name: Copy crt
    ansible.builtin.copy:
      src: "{{ install_src_dir }}/data/fullchain.pem"
      dest: "{{ platform_dir }}/services/portal/DigitalTWINS-Portal/certs/"
      mode: '0600'
    when: lookup('env', 'PLATFORM_PROTOCOL') | default('https') == 'https'

  - name: Copy key
    ansible.builtin.copy:
      src: "{{ install_src_dir }}/data/privkey.pem"
      dest: "{{ platform_dir }}/services/portal/DigitalTWINS-Portal/certs/"
      mode: '0600'
    when: lookup('env', 'PLATFORM_PROTOCOL') | default('https') == 'https'

  - name: Generate nginx.conf from SSL template
    ansible.builtin.shell:
      cmd: "envsubst '${PLATFORM_DOMAIN}' < nginx.conf.template > DigitalTWINS-Portal/frontend/nginx.conf"
      chdir: "{{ platform_dir }}/services/portal"
    environment:
      PLATFORM_DOMAIN: "{{ lookup('env', 'PLATFORM_DOMAIN') }}"
    when: lookup('env', 'PLATFORM_PROTOCOL') | default('https') == 'https'

  - name: Generate nginx.conf from HTTP template
    ansible.builtin.shell:
      cmd: "envsubst '${PLATFORM_DOMAIN}' < nginx.conf.http.template > DigitalTWINS-Portal/frontend/nginx.conf"
      chdir: "{{ platform_dir }}/services/portal"
    environment:
      PLATFORM_DOMAIN: "{{ lookup('env', 'PLATFORM_DOMAIN') }}"
    when: lookup('env', 'PLATFORM_PROTOCOL') | default('https') == 'http'

  - name: Generate config.js from template (sets window.RUNTIME_CONFIG for Keycloak URL)
    ansible.builtin.shell:
      cmd: "envsubst '${PLATFORM_DOMAIN} ${PLATFORM_PROTOCOL}' < config.js.template > config.js"
      chdir: "{{ platform_dir }}/services/portal/DigitalTWINS-Portal/frontend"
    environment:
      PLATFORM_DOMAIN: "{{ lookup('env', 'PLATFORM_DOMAIN') }}"
      PLATFORM_PROTOCOL: "{{ lookup('env', 'PLATFORM_PROTOCOL') | default('https') }}"

  - name: Check if .env already exists
    stat:
      path: "{{ platform_dir }}/.env"
    register: dotenv_check

  # Template comes from the version-controlled repo (clean_src), the single
  # source of truth. Only the secrets (secrets.env) and the per-deployment
  # config (env) live in the untracked data dir. The operator must source
  # both secrets.env and env before running this playbook so ${VAR} and
  # ${PLATFORM_DOMAIN}/${PLATFORM_PROTOCOL} resolve.
  - name: Generate .env from repo template (first deploy only)
    ansible.builtin.shell:
      cmd: "set -a && source {{ install_src_dir }}/data/secrets.env && source {{ install_src_dir }}/data/env && set +a && envsubst < {{ install_src_dir }}/clean_src/digitaltwins-platform/.env.template > {{ platform_dir }}/.env"
      executable: /bin/bash
    when: not dotenv_check.stat.exists

  - name: Ensure .env permissions (first deploy only)
    ansible.builtin.file:
      path: "{{ platform_dir }}/.env"
      mode: '0600'
    when: not dotenv_check.stat.exists

  # env is the operator-maintained per-deployment config (data/env), copied
  # verbatim. The committed env.template is only the starter the operator
  # copied data/env from — it is never used to generate the live env.
  - name: Copy per-deployment env to platform dir
    ansible.builtin.copy:
      src: "{{ install_src_dir }}/data/env"
      dest: "{{ platform_dir }}/env"
      mode: '0600'

  - name: check for seek env file
    stat:
      path: "{{ platform_dir }}/services/seek/ldh-deployment/docker-compose.env"
    register: file_check3

  - name: Create seek env file
    ansible.builtin.copy:
      dest: "{{ platform_dir }}/services/seek/ldh-deployment/docker-compose.env"
      content: |
        MYSQL_HOST=db
        MYSQL_ROOT_PASSWORD={{ lookup('env', 'MYSQL_ROOT_PASSWORD') }}
        MYSQL_DATABASE=seek
        MYSQL_USER=seek
        MYSQL_PASSWORD={{ lookup('env', 'MYSQL_PASSWORD') }}
      mode: '0600'
    when: not file_check3.stat.exists


# On a system you have up and running, functioning the way you want, you can "freeze" it like so:
# docker compose ps -aq | xargs docker inspect --format '{{.Config.Image}}' | sort -u| xargs docker save | gzip > digitaltwins-images-all.tar.gz
# Then copy the digitaltwins-images-all.tar.gz to the {{ install_src_dir }}

  - name: Load Docker images from archive
    ansible.builtin.shell:
      cmd: "gunzip -c {{ install_src_dir }}/digitaltwins-images-all.tar.gz | docker load"
    args:
      executable: /bin/bash

  - name: Initialize airflow.cfg
    ansible.builtin.command: docker compose run airflow-cli airflow config list
    args:
      chdir: "{{ platform_dir }}"

#  # The last config list puts a wonky ownership on the .cfg file, which we need to adjust, so ...
#  - name: Force ownership on Airflow config
#    become: true
#    ansible.builtin.file:
#      #path: "/home/{{ ansible_user }}/digitaltwins-platform/services/airflow/config/airflow.cfg"
#      path: "./digitaltwins-platform/services/airflow/config/airflow.cfg"
#      owner: "{{ ansible_user }}"
#      group: "{{ ansible_user }}"
#      mode: '0644'

  - name: allow_headers
    shell: |
      sed -i "s/^access_control_allow_headers.*$/access_control_allow_headers = origin, content-type, accept/" ./services/airflow/config/airflow.cfg
    args:
      chdir: "{{ platform_dir }}"

  - name: allow_methods
    shell: |
      sed -i "s/^access_control_allow_methods.*/access_control_allow_methods = POST, GET, OPTIONS, DELETE/" ./services/airflow/config/airflow.cfg
    args:
      chdir: "{{ platform_dir }}"

  - name: allow_origins
    shell: |
      sed -i "s/^access_control_allow_origins.*/access_control_allow_origins = /" ./services/airflow/config/airflow.cfg
    args:
      chdir: "{{ platform_dir }}"

  - name: Set Airflow base_url
    ansible.builtin.lineinfile:
      path: "{{ platform_dir }}/services/airflow/config/airflow.cfg"
      regexp: '^(#\s*)?base_url\s*=\s*.*'
      line: "base_url = https://{{ lookup('env', 'PLATFORM_DOMAIN') }}/airflow"
      state: present

  - name: Enable Airflow proxy fix
    ansible.builtin.lineinfile:
      path: "{{ platform_dir }}/services/airflow/config/airflow.cfg"
      regexp: '^(#\s*)?enable_proxy_fix\s*=\s*.*'
      line: 'enable_proxy_fix = True'
      state: present

  - name: airflow-init
    ansible.builtin.command: docker compose up airflow-init
    args:
      chdir: "{{ platform_dir }}"

  - name: docker down
    ansible.builtin.command: docker compose down
    args:
      chdir: "{{ platform_dir }}"

###

  # Realm template comes from the version-controlled repo (clean_src), the
  # single source of truth. Secrets (client secrets, KEYCLOAK_REALM_ADMIN_PASSWORD)
  # come from data/secrets.env; PLATFORM_DOMAIN/PROTOCOL from data/env. The
  # template carries no realm signing keys (Keycloak regenerates them on import)
  # and seeds test users with plaintext passwords (see deployment docs).
  # Generate the realm import straight into the keycloak import dir — no
  # realm artifact is left in data/. The data dir only holds the secrets
  # (secrets.env) and per-deployment config (env) that feed envsubst.
  - name: Generate digitaltwins-realm.json from repo template
    ansible.builtin.shell:
      cmd: >
        set -a && source {{ install_src_dir }}/data/secrets.env && source {{ install_src_dir }}/data/env && set +a &&
        export KC_SSL_REQUIRED=$([ "$PLATFORM_PROTOCOL" = "https" ] && echo "external" || echo "none") &&
        envsubst < {{ install_src_dir }}/clean_src/digitaltwins-platform/services/keycloak/digitaltwins-realm.json.template > {{ platform_dir }}/services/keycloak/import/digitaltwins-realm.json
      executable: /bin/bash

  - name: Set realm import permissions
    ansible.builtin.file:
      path: "{{ platform_dir }}/services/keycloak/import/digitaltwins-realm.json"
      mode: '0644'

  - name: Copy realm import to keys (backup)
    ansible.builtin.copy:
      src: "{{ platform_dir }}/services/keycloak/import/digitaltwins-realm.json"
      dest: "{{ keys_dir }}/digitaltwins-realm.json"
      mode: '0600'
      remote_src: true

  - name: Startup seek
    ansible.builtin.command: docker compose up -d seek
    args:
      chdir: "{{ platform_dir }}"

  # Better solution to the "wait" problem...
  - name: Wait for background migrations to create the users table
    ansible.builtin.command: >
      docker exec seek bash -c 
      'cd /seek && RAILS_ENV=production bundle exec rails runner "exit(ActiveRecord::Base.connection.table_exists?(:users) ? 0 : 1)"'
    register: table_check
    # Try up to 15 times, waiting 10 seconds between attempts (max 150 seconds)
    retries: 15
    delay: 10
    # Keep looping until the command returns an exit code of 0 (Success)
    until: table_check.rc == 0
    # This prevents Ansible from reporting 'changed' since we are only reading state, not modifying it
    changed_when: false

  - name: Set SEEK_ADMIN_PASSWORD from environment variable
    ansible.builtin.set_fact:
      seek_admin_password: "{{ lookup('env', 'SEEK_ADMIN_PASSWORD') }}"

  - name: Set SEEK_ADMIN_EMAIL from environment variable
    ansible.builtin.set_fact:
      seek_admin_email: "{{ lookup('env', 'SEEK_ADMIN_EMAIL') }}"

  - name: admin user
    ansible.builtin.command: "./create-admin-user.sh admin {{ seek_admin_password }} {{ seek_admin_email }}"
    args:
      chdir: "{{ platform_dir }}/buildout/util"

  - name: features
    ansible.builtin.command: "./enable-features.sh"
    args:
      chdir: "{{ platform_dir }}/buildout/util"

  - name: token
    ansible.builtin.command: "./generate-token.sh"
    args:
      chdir: "{{ platform_dir }}/buildout/util"

  - name: all down
    ansible.builtin.command: docker compose down
    args:
      chdir: "{{ platform_dir }}"

  - name: Ensure notebook_workspace directory exists for jupyter
    ansible.builtin.file:
      path: "{{ platform_dir }}/notebook_workspace"
      state: directory
      mode: '0775'

  - name: Start docker compose services
    shell: |
      docker compose up -d
    args:
      chdir: "{{ platform_dir }}"
