services:
  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    ports:
      - '8011:9000' #api
      - '8012:9001' # web gui
    networks:
      - digitaltwins-platform
    volumes:
      - 'minio_data:/data'
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_SERVER_ACCESS_KEY=${MINIO_SERVER_ACCESS_KEY:-minioadmin}
      - MINIO_SERVER_SECRET_KEY=${MINIO_SERVER_SECRET_KEY:-minioadmin}
      # Tells the Console its public base URL so all static/API/redirect paths get the /minio-console prefix.
      # Filled from .env (see .env.template). HTTP default is used only when unset.
      - MINIO_BROWSER_REDIRECT_URL=${MINIO_BROWSER_REDIRECT_URL:-http://localhost/minio-console}
    command: server /data --console-address ":9001" --address ":9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./init-minio.sh:/init-minio.sh:ro
    entrypoint: /bin/sh /init-minio.sh
    networks:
      - digitaltwins-platform

volumes:
  minio_data:
    driver: local
    name: ${PROJECT_NAME}_minio_data

networks:
  digitaltwins-platform:
    driver: bridge
    name: ${PROJECT_NAME}
