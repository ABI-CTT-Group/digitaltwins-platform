services:
  jupyterlab:
    image: jupyter/base-notebook
    user: root
    environment:
      - NB_UID=1000
      - NB_GID=1000
      - CHOWN_HOME=yes
      - CHOWN_HOME_OPTS=-R
      - JUPYTER_TOKEN=${JUPYTERLAB_TOKEN:-admin}
    ports:
      - "${JUPYTERLAB_BIND_ADDRESS:-0.0.0.0}:8008:8888"
    volumes:
      - notebook_workspace:/home/jovyan/work
    command: start-notebook.sh
    restart: unless-stopped

volumes:
  notebook_workspace:
    driver: local

