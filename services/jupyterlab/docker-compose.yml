services:
  jupyterlab:
    image: jupyter/base-notebook:lab-4.0.7
    user: root
    environment:
      - NB_UID=1000
      - NB_GID=1000
      - CHOWN_HOME=yes
      - CHOWN_HOME_OPTS=-R
      - JUPYTER_TOKEN=${JUPYTERLAB_TOKEN:-admin}
    ports:
      - "8008:8888"
    volumes:
      - notebook_workspace:/home/jovyan/work
    networks:
      - digitaltwins-platform

    command: start-notebook.sh
    restart: unless-stopped

volumes:
  notebook_workspace:
    driver: local
    name: ${PROJECT_NAME}_notebook_workspace

networks:
  digitaltwins-platform:
    driver: bridge
    name: ${PROJECT_NAME}
