# By default Keycloak requires HTTPS to be enabled for external IP addresses,
# if you access Keycloak with an internal IP address, this is not required.
# However, if you access Keycloak from a external network,
# you need to add your proxy configs/SSL certificate to Keycloak, see docker-compose-https.yml as an example

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.3.2
    container_name: keycloak
    command:
      - start
      - --http-enabled=true
      - --import-realm # will only import once on the first startup
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME_PATH: /auth
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME_STRICT: ${KC_HOSTNAME_STRICT:-true}
      KC_HOSTNAME_STRICT_HTTPS: ${KC_HOSTNAME_STRICT_HTTPS:-true}
      KC_PROXY: edge
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: ${PLATFORM_PROTOCOL:-https}://${PLATFORM_DOMAIN}/auth
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://database:5432/keycloak
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
#    ports:
#      - "${KEYCLOAK_BIND_ADDRESS:-0.0.0.0}:8009:8443"
#      - "8009:8080"
    volumes:
      - ./import:/opt/keycloak/data/import
      - ./digitaltwins-login-theme:/opt/keycloak/themes/digitaltwins-login-theme:ro
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - digitaltwins

#networks:
