# By default Keycloak requires HTTPS to be enabled for external IP addresses,
# if you access Keycloak with an internal IP address, this is not required.
# However, if you access Keycloak from a external network,
# you need to add your proxy configs/SSL certificate to Keycloak, see docker-compose-https.yml as an example

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.3.2
    container_name: keycloak
    command:
      - start-dev
      - --import-realm
      - --http-relative-path=/auth
    environment:
      # DO NOT use --proxy=edge in command; use these Env vars instead
      KC_PROXY_HEADERS: xforwarded        # This tells KC to trust X-Forwarded-* headers
      KC_HTTP_ENABLED: "true"             # Essential for the internal 8080 link
      KC_HTTP_PORT: "8080"
      KC_HOSTNAME: test.digitaltwins.auckland.ac.nz
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "true"
        #    command:
        #      - start-dev
        #      - --import-realm
        #      - --http-relative-path=/auth
        #      # Notice: No --hostname-strict-https here, we move it to Env
        #    environment:
        #      - KC_PROXY=edge
        #      - KC_HOSTNAME=test.digitaltwins.auckland.ac.nz
        #      - KC_HOSTNAME_STRICT=false
        #      - KC_HOSTNAME_STRICT_HTTPS=true  # This is the correct Env var name
        #      - KC_HTTP_ENABLED=true
        #      - KC_BOOTSTRAP_ADMIN_USERNAME=${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
        #      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
#    ports:
#      - "${KEYCLOAK_BIND_ADDRESS:-0.0.0.0}:8009:8443"
#      - "8009:8080"
    volumes:
      - ./import:/opt/keycloak/data/import
      - keycloak_data:/opt/keycloak/data
      - ./server.jks:/opt/keycloak/conf/server.jks
    restart: unless-stopped
    networks:
      - digitaltwins

volumes:
  keycloak_data:
    driver: local

