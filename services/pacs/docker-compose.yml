services:
  orthanc:
    image: jodogne/orthanc:1.12.10
    container_name: digitaltwins-orthanc
    init: true
    ports:
      - "${ORTHANC_HTTP_PORT:-8042}:8042" # Web UI and REST API
      - "${ORTHANC_DICOM_PORT:-4242}:4242" # DICOM protocol
    volumes:
      - ./orthanc.json:/etc/orthanc/orthanc.json:ro
      - orthanc_data:/var/lib/orthanc/db
    environment:
      - ORTHANC_ADMIN_USER=${ORTHANC_ADMIN_USER}
      - ORTHANC_ADMIN_PASSWORD=${ORTHANC_ADMIN_PASSWORD}
      - ORTHANC_AET=${ORTHANC_AET}
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null --user=$ORTHANC_ADMIN_USER --password=$ORTHANC_ADMIN_PASSWORD http://localhost:8042/system" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - digitaltwins

volumes:
  orthanc_data:
    driver: local

networks:
  digitaltwins:
    driver: bridge
