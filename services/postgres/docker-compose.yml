services:
  database:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-digitaltwins}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./digitaltwins_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./airflow_init.sql:/docker-entrypoint-initdb.d/02_airflow.sql:ro
    ports:
      - "8003:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-digitaltwins}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - digitaltwins-platform

  pgadmin:
    image: dpage/pgadmin4:9.14.0
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-clin864@aucklanduni.ac.nz}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_LISTEN_ADDRESS: 0.0.0.0 # force IPv4 binding
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "8004:80"
    depends_on:
      - database
    networks:
      - digitaltwins-platform
volumes:
  postgres_data:
    driver: local
    name: ${PROJECT_NAME}_postgres_data
  pgadmin_data:
    driver: local

networks:
  digitaltwins-platform:
    driver: bridge
    name: ${PROJECT_NAME}
