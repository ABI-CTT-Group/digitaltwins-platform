services:
  database:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-digitaltwins}
    volumes:
      - /home/ubuntu/pgdata:/var/lib/postgresql/data:Z
      - ./digitaltwins_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "${POSTGRES_BIND_ADDRESS:-0.0.0.0}:8003:5432"
    networks:
      - digitaltwins

  pgadmin:
    image: dpage/pgadmin4:frozen-20260324
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-clin864@aucklanduni.ac.nz}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_LISTEN_ADDRESS: 0.0.0.0 # force IPv4 binding
    volumes:
      - /home/ubuntu/pgadmin_data:/var/lib/pgadmin:Z
#    ports:
#      - "8004:80"
    depends_on:
      - database
    networks:
      - digitaltwins
