services:
  jupyterhub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: digitaltwins-platform-jupyterhub
    ports:
      - "${JUPYTERHUB_PORT:-8016}:8000"
    volumes:
      - ./jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py:ro
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - jupyterhub_data:/srv/jupyterhub
    # The `${X:-...}` defaults here are the only ones: jupyterhub_config.py
    # reads these with os.environ[...] and keeps no default of its own.
    environment:
      # --- Keycloak OIDC ---
      # PUBLIC: browser redirect URL, must match KC_HOSTNAME.
      # INTERNAL: container-to-container hop for token exchange / userinfo.
      - KEYCLOAK_PUBLIC_URL=${KEYCLOAK_PUBLIC_URL:-http://localhost/auth}
      - KEYCLOAK_INTERNAL_URL=${KEYCLOAK_INTERNAL_URL:-http://keycloak:8080/auth}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-digitaltwins}
      # Keycloak OIDC client credentials.
      - JUPYTERHUB_CLIENT_ID=${JUPYTERHUB_CLIENT_ID:-jupyterhub}
      - JUPYTERHUB_CLIENT_SECRET=${JUPYTERHUB_CLIENT_SECRET:-jupyterhub-secret}
      # --- JupyterHub ---
      # Browser-facing base URL (must match gateway route and Keycloak redirectUris).
      - JUPYTERHUB_PUBLIC_URL=${JUPYTERHUB_PUBLIC_URL:-http://localhost/jupyter}
      - JUPYTERHUB_CRYPT_KEY=${JUPYTERHUB_CRYPT_KEY:-c3b53f650bf93c3c6f8f5b8a5b2803b9b4d1b8c2810a9a8f2762a4f4e2b027d1}
      # --- Group / user access control ---
      - JUPYTERHUB_ALLOWED_GROUPS=${JUPYTERHUB_ALLOWED_GROUPS:-admin,researcher}
      - JUPYTERHUB_ADMIN_GROUPS=${JUPYTERHUB_ADMIN_GROUPS:-admin}
      - JUPYTERHUB_ADMIN_USERS=${JUPYTERHUB_ADMIN_USERS:-admin}
      # --- Docker spawner ---
      - DOCKER_NETWORK_NAME=${PROJECT_NAME:-digitaltwins-platform}
      - DOCKER_NOTEBOOK_IMAGE=digitaltwins-platform-jupyter-singleuser:latest
      - DOCKER_NOTEBOOK_DIR=/home/jovyan/work
      - DOCKER_MEM_LIMIT=8G
      - DOCKER_CPU_LIMIT=4
    restart: unless-stopped
    networks:
      - digitaltwins-platform
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Single-user notebook image — built once, used by DockerSpawner per user
  singleuser:
    build:
      context: .
      dockerfile: Dockerfile.singleuser
    image: digitaltwins-platform-jupyter-singleuser:latest
    command: [ "echo", "Image built successfully" ]
    networks:
      - digitaltwins-platform

volumes:
  jupyterhub_data:
    driver: local
    name: ${PROJECT_NAME}_jupyterhub_data

networks:
  digitaltwins-platform:
    driver: bridge
    name: ${PROJECT_NAME}

# JupyterHub
# http://localhost:8016
# admin page: http://localhost:8016/hub/admin
#
# Build all images (including singleuser):
#   docker compose -f services/jupyterhub/docker-compose.yml --env-file ./.env --profile build build
#
# Run:
#   docker compose -f services/jupyterhub/docker-compose.yml --env-file ./.env up -d
