# ============================================================================
# Fallback: anything platform-routes.conf did not match goes to portal-frontend.
#
# This one hop carries ALL portal traffic: the SPA, /api/, /tools/, and every plugin
# route /plugin/<expose>/.
#
# Every directive below is load-bearing. With nginx defaults this hop silently breaks
# three things — no error, no log entry, just wrong behaviour:
#
#   1. proxy_buffering off
#        Otherwise nginx buffers the SSE build/deploy log stream and the terminal goes
#        from live to "one delayed burst at the end".
#
#   2. client_max_body_size 0
#        Otherwise the default 1m cap applies and plugin/dataset uploads 413 at the
#        edge. The edge is a transparent pipe ON PURPOSE; the real ceiling belongs to
#        portal-frontend (MAX_UPLOAD_MB / MAX_PART_SIZE_MB) — the layer that knows what
#        the limit means and can return a coherent error.
#
#   3. Upgrade / Connection headers
#        Otherwise plugin backends' WebSocket handshakes fail.
#
# The portal derives its public scheme from the SSL env var, not from
# X-Forwarded-Proto, so gateway→portal speaking plain HTTP internally does NOT make the
# backend emit http:// URLs. Set SSL in the root .env to match how a browser reaches
# this gateway.
#
# proxy_pass goes through a variable for the same reason as the platform routes: a
# literal would be resolved at config-parse time and a not-yet-started portal-frontend
# would stop nginx from booting at all. See the header of platform-routes.conf.
# No URI part on the proxy_pass, so the original request URI is forwarded unchanged.
# ============================================================================
location / {
    set $up_portal portal-frontend;
    proxy_pass http://$up_portal;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    proxy_buffering           off;
    proxy_request_buffering   off;
    proxy_cache               off;
    chunked_transfer_encoding off;
    client_max_body_size      0;
    proxy_read_timeout        86400;
    proxy_send_timeout        3600s;
}
