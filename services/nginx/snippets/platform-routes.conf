# ============================================================================
# Platform-level routes — the single authoritative copy.
#
# This file is bind-mounted into the gateway container. Edit it and the change is
# live immediately — NO image rebuild, NO container restart:
#
#     docker exec digitaltwins-platform-gateway nginx -t        # check syntax first
#     docker exec digitaltwins-platform-gateway nginx -s reload
#
# It is expanded INSIDE server{}, so only server-level directives (location, ...)
# belong here. http-level directives (`map`, `resolver`) go in http-level.conf.
#
# NOT yours: /, /api/, /tools/, /plugin/* belong to the portal — portal-fallback.conf
# forwards them to portal-frontend. Never hand-write a /plugin/ route; portal-backend
# generates those.
#
# ---------------------------------------------------------------------------
# WHY EVERY proxy_pass GOES THROUGH A `set` VARIABLE
#
# nginx resolves a literal `proxy_pass http://seek:3000` at config-parse time, so a
# service that is not running makes nginx refuse to START — taking the whole edge
# down, portal included. Through a variable (with the resolver in http-level.conf),
# the name is resolved per request instead: a missing upstream 502s that one route
# and nothing else.
#
# The catch, and it bites: with a variable, nginx no longer strips the location
# prefix for you. `proxy_pass http://$h:9001/;` sends a literal "/" for every
# request instead of rewriting the path. Where the old config relied on that strip
# (a trailing slash on proxy_pass), use an explicit `rewrite ... break` — see
# /minio/ below. Where it did not (no trailing slash), the full request URI
# is forwarded unchanged, same as before.
# ============================================================================

# ---------------------------------------------------------------------------
# ⚠️ READ THIS BEFORE DEBUGGING ANY ROUTE BELOW
#
# A route here only works if the app behind it KNOWS it is mounted under a prefix.
# nginx proxying is almost never the bug: a 404, or a redirect that escapes to `/`,
# means the request DID reach the app — the app just thinks it lives at the root.
# Each app is told its prefix by exactly one setting, named per route below.
#
#     SEEK        RAILS_RELATIVE_URL_ROOT: "/seek"   (seek/ldh-deployment/…)   ✅ live
#     JupyterHub  c.JupyterHub.base_url = '/jupyter/' (jupyterhub_config.py)   ✅ live
#     Keycloak    KC_HTTP_RELATIVE_PATH=/auth        (root .env)               ✅ live
#     HAPI FHIR   serves /fhir natively, no setting needed                     ✅ live
#     Airflow     no base_url set                                              ⚠️ NOT live
#
# Airflow is the one holdout — see its route below. Changing the prefix of any of the
# others means editing that app's config and RESTARTING that service; `nginx -s reload`
# alone is not enough, because the setting lives in the app, not here.
#
# Blast radius to respect: Keycloak's KC_HOSTNAME is the `iss` in every token, and
# JupyterHub's public URL is validated by Keycloak against the `jupyterhub` client's
# registered redirectUris. Move either and its counterpart must move in the same commit.
# ---------------------------------------------------------------------------

# SEEK — service `seek`, port 3000.
#
# Mounted at /seek by RAILS_RELATIVE_URL_ROOT: "/seek" in
# services/seek/ldh-deployment/docker-compose.yml (set on BOTH `seek` and `workers`).
# The image's entrypoint renders that into its own internal nginx, so Rails routes and
# asset paths move with it and the URI passes through here unrewritten.
#
# Consequence: the published port serves at http://localhost:${SEEK_PORT}/seek (8001) —
# its ROOT now 404s. That is expected, not a regression.
location /seek/ {
    set $up_seek seek;
    proxy_pass http://$up_seek:3000;

    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host   $host;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-Forwarded-Prefix /seek;
}

# Airflow — service `airflow-apiserver`, port 8080.
#
# Mounted at /airflow by AIRFLOW__API__BASE_URL=http://localhost/airflow in
# services/airflow/docker-compose.yml. That makes the api-server emit <base href="/airflow/">
# and /airflow/static/... asset paths; without it the React UI used <base href="/"> and
# root-absolute /static/... links, so behind this route the bundle 404'd and the page was
# blank (even though the request reached Airflow and returned a 200 index). The URI passes
# through here unrewritten. Direct port access at http://localhost:${AIRFLOW_PORT} (8002)
# still works — its root serves the index and assets load from the /airflow prefix.
location /airflow/ {
    set $up_airflow airflow-apiserver;
    proxy_pass http://$up_airflow:8080;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
}

# JupyterHub — service `jupyterhub`, port 8000.
#
# Mounted at /jupyter by c.JupyterHub.base_url = '/jupyter/' in
# services/jupyterhub/jupyterhub_config.py. That one setting moves the Hub, its
# configurable-http-proxy routes AND each spawned single-user server together, so the
# whole /jupyter/ subtree belongs to JupyterHub and the URI passes through unrewritten.
#
# ⚠️ Login is bound to this path in two other places — all three must agree:
#   - JUPYTERHUB_PUBLIC_URL (root .env) — builds the post-logout redirect
#   - the `jupyterhub` client's redirectUris in services/keycloak/import/*.json
# Keycloak validates the OAuth callback against that list; a mismatch fails login with
# an "Invalid redirect_uri" page and NOTHING in JupyterHub's own logs. Realm JSON is
# imported on first boot only — recreate the keycloak volume after editing it.
#
# (Historical note: the route the portal used to carry pointed at `jupyterlab:8888`.
# There is no jupyterlab service — services/jupyterlab is commented out of the root
# compose `include` — so that route could only ever have 502'd.)
location /jupyter/ {
    set $up_jupyter jupyterhub;
    proxy_pass http://$up_jupyter:8000;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 86400;
}

# Keycloak — service `keycloak`, port 8080, serving under /auth (KC_HTTP_RELATIVE_PATH).
#
# This is THE login path for the whole platform. It exists because a browser on an
# https:// page may not call an http:// endpoint — mixed active content is blocked — so
# Keycloak cannot stay on a plain-HTTP :8009 once the portal is served over TLS. Behind
# this route it shares the gateway's certificate and origin: one port, one cert.
#
# Keycloak already serves under /auth, so the URI passes through unrewritten.
#
# Cookies and redirect URLs are Keycloak's job, not nginx's: KC_PROXY_HEADERS=xforwarded
# makes it trust the X-Forwarded-* headers below, so it sets Secure/SameSite itself and
# emits https:// redirects. Do not add proxy_cookie_path rewriting here — an earlier
# version of this config did, and rewriting cookies underneath an app that is already
# setting them correctly is how you get login loops that only reproduce in one scheme.
#
# ⚠️ KC_HOSTNAME, PORTAL_KEYCLOAK_BASE_URL, ORTHANC_KEYCLOAK_URL and KEYCLOAK_PUBLIC_URL
# must ALL name this same URL. It is the `iss` in every issued token; if one of them
# drifts, that consumer's logins fail with an issuer mismatch and nothing else breaks —
# which makes it a genuinely annoying bug to find.
location /auth/ {
    set $up_keycloak keycloak;
    proxy_pass http://$up_keycloak:8080;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;
}

# HAPI FHIR — service `hapi-fhir`, port 8080.
#
# The FHIR R4 REST API. This is the platform's public FHIR base URL: http://<host>/fhir.
#
# The only route here that needed no change to the app it fronts: HAPI already serves the
# REST API at /fhir (services/hapi-fhir/application.yaml leaves server.servlet.context-path
# commented out), so the prefix matches natively and the URI passes through unrewritten.
# It was simply never routed — reachable only on host port 8013 and by container name.
#
# portal-backend does NOT come through here: it talks to hapi-fhir:8080/fhir directly on
# the shared network (FHIR_ENDPOINT). This route exists for browsers and external clients.
#
# NOT routed: HAPI's web tester UI, which lives at the container's `/` and would collide
# with the portal. It stays on http://localhost:8013. Moving it under a prefix means
# setting server.servlet.context-path, which also moves the REST API and would force
# FHIR_ENDPOINT to change — not worth it for a debug UI.
#
# X-Forwarded-* matter here beyond the usual logging: HAPI builds the absolute URLs in
# every Bundle.link and resource `fullUrl` from the incoming request. Without them it
# would hand clients back http://hapi-fhir:8080/... — an address no browser can resolve.
location /fhir/ {
    set $up_fhir hapi-fhir;
    proxy_pass http://$up_fhir:8080;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Port  $server_port;

    # FHIR bulk export / large Bundles stream for a long time.
    client_max_body_size 0;
    proxy_read_timeout 300s;
}

# MinIO Console (management UI) — service `minio`, console port 9001.
#
# The Console learns its public base from MINIO_BROWSER_REDIRECT_URL (root .env). That
# value MUST match this location's prefix (`/minio`), or the Console builds asset/redirect
# paths under one prefix while nginx serves another and it dies behind the subpath.
# MinIO is also published on the host at 8012.
#
# portal-frontend carries a same-named location, but that is a DEV-ONLY copy for the
# standalone stack (which has no gateway). Here the gateway matches first, so requests
# never reach it. Change platform behaviour HERE.
#
# The `rewrite` replaces the prefix strip that a trailing-slash proxy_pass would have
# done — see the header note; a variable proxy_pass cannot do it.
location /minio/ {
    set $up_minio minio;
    rewrite ^/minio/(.*)$ /$1 break;
    proxy_pass http://$up_minio:9001;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Console uploads are large and long-running.
    client_max_body_size 0;
    proxy_request_buffering  off;
    proxy_buffering          off;
    chunked_transfer_encoding off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}

# pgAdmin — service `pgadmin`, port 80. Host also publishes 8004.
#
# pgAdmin supports subpath hosting natively via the X-Script-Name header: it builds all its
# own URLs (login POST, static assets, redirects) with that prefix. So strip /pgadmin off
# the proxied path and tell pgAdmin its script name. Without X-Script-Name those URLs would
# target `/` and break behind the subpath.
location /pgadmin/ {
    set $up_pgadmin pgadmin;
    rewrite ^/pgadmin/(.*)$ /$1 break;
    proxy_pass http://$up_pgadmin:80;

    proxy_set_header X-Script-Name    /pgadmin;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP        $remote_addr;
    proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
}

# Orthanc PACS (instance 1) — service `orthanc-1`, port 8042 (Web UI + REST + DICOMweb).
# Host also publishes 8014.
#
# ⚠️ BEST-EFFORT — verify in a browser before trusting. Stripping the prefix is enough for
# the REST API / DICOMweb, but this Orthanc runs Orthanc Explorer 2 (OE2) with Keycloak
# login via orthanc-auth-service, and that flow has its own base path and redirect URIs.
# Two things still need doing for the UI to fully work behind /orthanc-1:
#   1. Register http://<host>/orthanc-1/* on the `orthanc` client in Keycloak (redirectUris)
#      — same class as the jupyter fix; else login returns "Invalid redirect_uri".
#   2. OE2 may emit root-absolute asset paths (/ui/...). If /ui/app/ doesn't load, set OE2's
#      root/base in services/pacs/orthanc.json. (X-Forwarded-Prefix below helps newer Orthanc.)
location /orthanc-1/ {
    set $up_orthanc1 orthanc-1;
    rewrite ^/orthanc-1/(.*)$ /$1 break;
    proxy_pass http://$up_orthanc1:8042;

    proxy_http_version 1.1;
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-Forwarded-Prefix /orthanc-1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    client_max_body_size 0;    # DICOM instance uploads
    proxy_read_timeout 600s;
}

# Orthanc PACS (instance 2) — service `orthanc-2`, port 8042. Host also publishes 8017.
# Same BEST-EFFORT caveats as orthanc-1 above (Keycloak redirectUris for /orthanc-2/*, OE2 base path).
location /orthanc-2/ {
    set $up_orthanc2 orthanc-2;
    rewrite ^/orthanc-2/(.*)$ /$1 break;
    proxy_pass http://$up_orthanc2:8042;

    proxy_http_version 1.1;
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-Forwarded-Prefix /orthanc-2;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    client_max_body_size 0;
    proxy_read_timeout 600s;
}

# digitaltwins-api (metadata / orchestration API) — service `digitaltwins-api`, port 8000.
# Host also publishes 8010.
#
# ⚠️ NOT mounted at /api — that path belongs to the PORTAL backend (portal-fallback.conf).
# Using /api here would shadow the portal. Mounted at /digitaltwins-api instead; rename the
# prefix here + in X-Forwarded-Prefix if you want something shorter.
# ⚠️ /docs (Swagger) will render blank ("Failed to load API definition") until the app is
# told its root_path: FastAPI fetches the spec from a root-absolute /openapi.json, which is
# not under this prefix. Fix = run uvicorn with --root-path=/digitaltwins-api in the
# digitaltwins-api image/command (it's a submodule/upstream repo, so out of this file). This
# route proxies fine; only the /docs UI needs that root_path to locate its spec.
location /digitaltwins-api/ {
    set $up_dtapi digitaltwins-api;
    rewrite ^/digitaltwins-api/(.*)$ /$1 break;
    proxy_pass http://$up_dtapi:8000;

    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-Forwarded-Prefix /digitaltwins-api;
}
