# ============================================================================
# Platform-level routes — the single authoritative copy.
#
# This file is bind-mounted into the gateway container. Edit it and the change is
# live immediately — NO image rebuild, NO container restart:
#
#     docker exec digitaltwins-platform-gateway nginx -t        # check syntax first
#     docker exec digitaltwins-platform-gateway nginx -s reload
#
# It is expanded INSIDE server{}, so only server-level directives (location, ...)
# belong here. http-level directives (`map`, `resolver`) go in http-level.conf.
#
# NOT yours: /, /api/, /tools/, /plugin/* belong to the portal — portal-fallback.conf
# forwards them to portal-frontend. Never hand-write a /plugin/ route; portal-backend
# generates those.
#
# ---------------------------------------------------------------------------
# WHY EVERY proxy_pass GOES THROUGH A `set` VARIABLE
#
# nginx resolves a literal `proxy_pass http://seek:3000` at config-parse time, so a
# service that is not running makes nginx refuse to START — taking the whole edge
# down, portal included. Through a variable (with the resolver in http-level.conf),
# the name is resolved per request instead: a missing upstream 502s that one route
# and nothing else.
#
# The catch, and it bites: with a variable, nginx no longer strips the location
# prefix for you. `proxy_pass http://$h:9001/;` sends a literal "/" for every
# request instead of rewriting the path. Where the old config relied on that strip
# (a trailing slash on proxy_pass), use an explicit `rewrite ... break` — see
# /minio-console/ below. Where it did not (no trailing slash), the full request URI
# is forwarded unchanged, same as before.
# ============================================================================

# ---------------------------------------------------------------------------
# ⚠️ READ THIS BEFORE DEBUGGING ANY ROUTE BELOW
#
# Every platform service here is currently configured to live at the ROOT path, and
# every one of them is reached today through its own published host port:
#
#     SEEK        RAILS_RELATIVE_URL_ROOT: "/"        → http://localhost:8001
#     Airflow     no base_url set                      → http://localhost:8002
#     JupyterHub  no c.JupyterHub.base_url set         → http://localhost:8016
#     Keycloak    KC_HOSTNAME pinned to localhost:8009 → http://localhost:8009
#
# So these /seek /airflow /jupyter /auth locations do NOT work yet — and they never
# did. They were inherited verbatim from the portal's old SSL template, where they
# were equally dead (and absent from the HTTP template entirely). Proxying is not the
# problem: a 404 or a redirect to /hub/... means the request DID reach the app; the
# app just doesn't know it's mounted under a prefix.
#
# Making one work = telling that app its prefix (one setting each, listed per route
# below) and reloading. Each has its own blast radius — Keycloak's especially, since
# changing KC_HOSTNAME changes the token issuer and breaks every login unless the
# portal's PORTAL_KEYCLOAK_BASE_URL moves with it.
#
# Note how cheap that fix now is: edit one line here, `nginx -s reload`. Before this
# gateway existed, the same edit meant rebuilding the portal's frontend image.
# ---------------------------------------------------------------------------

# SEEK — service `seek`, port 3000.
#
# ⚠️ Returns 404 today: services/seek/ldh-deployment/docker-compose.yml sets
# RAILS_RELATIVE_URL_ROOT: "/", so SEEK serves from the root and knows nothing about
# /seek. To mount it here, set RAILS_RELATIVE_URL_ROOT: "/seek" (on both the `seek`
# and `workers` services) and restart. Direct access: http://localhost:${SEEK_PORT} (8001).
location /seek/ {
    set $up_seek seek;
    proxy_pass http://$up_seek:3000;

    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host   $host;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-Forwarded-Prefix /seek;
}

# Airflow — service `airflow-apiserver`, port 8080.
#
# ⚠️ Not usable today: no base_url is configured, so Airflow serves from the root and
# emits links rooted at `/`. To mount it here, set AIRFLOW__API__BASE_URL (Airflow 3;
# AIRFLOW__WEBSERVER__BASE_URL on 2.x) to http://<host>/airflow in
# services/airflow/docker-compose.yml and restart.
# Direct access: http://localhost:${AIRFLOW_PORT} (8002).
location /airflow/ {
    set $up_airflow airflow-apiserver;
    proxy_pass http://$up_airflow:8080;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
}

# JupyterHub — service `jupyterhub`, port 8000.
#
# ⚠️ NOT USABLE YET — the upstream below is right, but JupyterHub is not configured
# for a subpath. Two facts:
#   1. The route the portal used to carry pointed at `jupyterlab:8888`. There is no
#      jupyterlab service here — services/jupyterlab is commented out of the root
#      compose `include`. That route could only ever have 502'd.
#   2. jupyterhub_config.py does not set c.JupyterHub.base_url, so JupyterHub thinks
#      it lives at `/` and emits absolute /hub/... links. Proxying it at /jupyter/
#      yields a broken page until you add:
#
#          c.JupyterHub.base_url = '/jupyter/'
#
#      to services/jupyterhub/jupyterhub_config.py and restart it.
#
# Until then use the published host port: http://localhost:${JUPYTERHUB_PORT} (8016).
location /jupyter/ {
    set $up_jupyter jupyterhub;
    proxy_pass http://$up_jupyter:8000;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 86400;
}

# Keycloak — service `keycloak`, port 8080, serving under /auth (KC_HTTP_RELATIVE_PATH).
#
# This is THE login path for the whole platform. It exists because a browser on an
# https:// page may not call an http:// endpoint — mixed active content is blocked — so
# Keycloak cannot stay on a plain-HTTP :8009 once the portal is served over TLS. Behind
# this route it shares the gateway's certificate and origin: one port, one cert.
#
# Keycloak already serves under /auth, so the URI passes through unrewritten.
#
# Cookies and redirect URLs are Keycloak's job, not nginx's: KC_PROXY_HEADERS=xforwarded
# makes it trust the X-Forwarded-* headers below, so it sets Secure/SameSite itself and
# emits https:// redirects. Do not add proxy_cookie_path rewriting here — an earlier
# version of this config did, and rewriting cookies underneath an app that is already
# setting them correctly is how you get login loops that only reproduce in one scheme.
#
# ⚠️ KC_HOSTNAME, PORTAL_KEYCLOAK_BASE_URL, ORTHANC_KEYCLOAK_URL and KEYCLOAK_PUBLIC_URL
# must ALL name this same URL. It is the `iss` in every issued token; if one of them
# drifts, that consumer's logins fail with an issuer mismatch and nothing else breaks —
# which makes it a genuinely annoying bug to find.
location /auth/ {
    set $up_keycloak keycloak;
    proxy_pass http://$up_keycloak:8080;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;
}

# MinIO Console (management UI) — service `minio`, console port 9001.
#
# The Console learns its public base from MINIO_BROWSER_REDIRECT_URL (root .env).
# Without it the Console assumes it is at `/`, sends every asset request to `/`, and
# dies behind a subpath. MinIO is also published on the host at 8012.
#
# portal-frontend carries a same-named location, but that is a DEV-ONLY copy for the
# standalone stack (which has no gateway). Here the gateway matches first, so requests
# never reach it. Change platform behaviour HERE.
#
# The `rewrite` replaces the prefix strip that a trailing-slash proxy_pass would have
# done — see the header note; a variable proxy_pass cannot do it.
location /minio-console/ {
    set $up_minio minio;
    rewrite ^/minio-console/(.*)$ /$1 break;
    proxy_pass http://$up_minio:9001;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Console uploads are large and long-running.
    client_max_body_size 0;
    proxy_request_buffering  off;
    proxy_buffering          off;
    chunked_transfer_encoding off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}
