# http{} context only. Included from conf/http/default.conf or conf/ssl/default.conf
# *outside* the server block.
#
# Do NOT include this from platform-routes.conf — that file is expanded inside
# server{}, and `map` / `resolver` are only legal in http{}. Putting them there
# fails `nginx -t`.

# Docker's embedded DNS. Required because every proxy_pass in platform-routes.conf
# and portal-fallback.conf routes through a *variable*.
#
# Why bother: nginx resolves a literal `proxy_pass http://seek:3000` at CONFIG
# PARSE time. If `seek` is not running, nginx refuses to start — and that takes the
# whole edge down with it, including the portal fallback. One optional service being
# off would make the entire platform unreachable. Routing through a variable defers
# resolution to request time, so a missing upstream is a 502 on that one route and
# nothing else. (Services genuinely do come and go here — jupyterlab is already
# commented out of the root compose `include`.)
resolver 127.0.0.11 valid=10s ipv6=off;

# WebSocket upgrade mapping. Needed by Airflow, JupyterHub, the MinIO Console,
# and every plugin backend proxied through the portal fallback.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
