# HTTP-mode server shell. Selected by NGINX_MODE in the root .env:
#
#     ./services/nginx/conf/${NGINX_MODE:-http}:/etc/nginx/conf.d:ro
#
# Docker picks the directory; there is no entrypoint script and no if-statement.
#
# The routes themselves live in snippets/ and are included by BOTH this file and
# conf/ssl/default.conf — one copy, two shells. That is what stops the old class
# of bug where /seek and /airflow existed only in the SSL template and the HTTP
# template silently lacked them.

include /etc/nginx/snippets/http-level.conf;

server {
    listen 80;
    server_name _;

    # Keycloak issues large headers; without this the response is a 502
    # ("upstream sent too big header").
    proxy_buffer_size       128k;
    proxy_buffers         4 256k;
    proxy_busy_buffers_size 256k;

    include /etc/nginx/snippets/platform-routes.conf;
    include /etc/nginx/snippets/portal-fallback.conf;
}
