# HTTPS-mode server shell. Enable it by setting NGINX_MODE=ssl in the root .env,
# then `docker compose up -d gateway` (seconds — no image build).
#
# THIS FILE IS MEANT TO BE HAND-EDITED. It is bind-mounted, so a change here needs
# only `docker exec digitaltwins-platform-gateway nginx -s reload`. That is why the
# cert paths and server_name are written as plain literals instead of being wrapped
# in another layer of envsubst indirection — just edit the lines.
#
# Certificates come from SSL_CERT_DIR (root .env), mounted read-only at
# /etc/nginx/certs. Either name your files server.crt / server.key, or change the
# two ssl_certificate lines below to match what you have.
#
# Also set SSL=true in the root .env so the portal backend generates https:// URLs.
# (The exception is TLS offloaded by a load balancer in *front* of this gateway:
# then it is SSL=true with NGINX_MODE=http.)

include /etc/nginx/snippets/http-level.conf;

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;                                     # ← set your real domain

    ssl_certificate     /etc/nginx/certs/server.crt;   # ← set your real cert file
    ssl_certificate_key /etc/nginx/certs/server.key;   # ← set your real key file
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers   HIGH:!aNULL:!MD5;

    # Keycloak issues large headers; without this the response is a 502
    # ("upstream sent too big header").
    proxy_buffer_size       128k;
    proxy_buffers         4 256k;
    proxy_busy_buffers_size 256k;

    include /etc/nginx/snippets/platform-routes.conf;
    include /etc/nginx/snippets/portal-fallback.conf;
}
