services:
  # The platform's edge. Owns host ports 80/443 and TLS, and carries the
  # platform-level routes (/seek /jupyter /auth /airflow /minio-console). Everything
  # else falls through to portal-frontend.
  #
  # Stock nginx image — no build:, no Dockerfile, no entrypoint script. The config is
  # bind-mounted, so operators edit a plain file and reload:
  #
  #     docker exec ${PROJECT_NAME}-gateway nginx -t
  #     docker exec ${PROJECT_NAME}-gateway nginx -s reload
  #
  # No image rebuild, no restart. See services/nginx/README.md.
  gateway:
    image: nginx:stable-alpine
    container_name: ${PROJECT_NAME}-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # NGINX_MODE (root .env) selects the server shell: `http` or `ssl`. Docker picks
      # the directory — that is what replaced the if-statement in the portal's old
      # entry.sh. The routes themselves are shared by both shells via snippets/.
      - ./services/nginx/conf/${NGINX_MODE:-http}:/etc/nginx/conf.d:ro
      - ./services/nginx/snippets:/etc/nginx/snippets:ro
      # Certs live with the only service that reads them. Override SSL_CERT_DIR in
      # .env to point somewhere else (e.g. /etc/letsencrypt/live/<domain>).
      - ${SSL_CERT_DIR:-./services/nginx/certs}:/etc/nginx/certs:ro
    restart: unless-stopped
    networks:
      - digitaltwins-platform
    depends_on:
      - portal-frontend

  portal-backend:
    extends:
      file: ./services/portal/DigitalTWINS-Portal/docker-compose.yml
      service: portal-backend
    restart: unless-stopped
    networks:
      - digitaltwins-platform
  # No host ports: the portal's base compose deliberately publishes none, so 80/443
  # stay free for the gateway above. (Its docker-compose.override.yml publishes 80 for
  # standalone dev, and `extends` reads only the file it names — so we never see it.)
  # The gateway reaches this container by service name on the shared network.
  portal-frontend:
    extends:
      file: ./services/portal/DigitalTWINS-Portal/docker-compose.yml
      service: portal-frontend
    restart: unless-stopped
    networks:
      - digitaltwins-platform
  hapi-fhir:
    extends:
      file: ./services/hapi-fhir/docker-compose.yml
      service: hapi-fhir
    restart: unless-stopped
    networks:
      - digitaltwins-platform
  hapi-fhir-postgres:
    extends:
      file: ./services/hapi-fhir/docker-compose.yml
      service: hapi-fhir-postgres
    restart: unless-stopped
    networks:
      - digitaltwins-platform

include:
  # to run only a specific included project with the root .env: sudo docker compose -f services/<service_name>/docker-compose.yml --env-file ./.env up

  # Keycloak
  - path:
      - services/keycloak/docker-compose.yml
    project_directory: services/keycloak
  # postgres
  - path:
      - services/postgres/docker-compose.yml
    project_directory: services/postgres
  # Airflow
  - path:
      - services/airflow/docker-compose.yml
      - services/airflow/network-override.yml
    project_directory: services/airflow
  # SEEK
  - path:
      - services/seek/ldh-deployment/docker-compose.yml
      - services/seek/network-override.yml
    project_directory: services/seek/ldh-deployment
  # MinIO
  - path:
      - services/minio/docker-compose.yml
    project_directory: services/minio
  # PACS (Orthanc)
  - path:
      - services/pacs/docker-compose.yml
    project_directory: services/pacs
  #  # TODO. disable for production. External PACS (pretend to be external). only for testing
  #  - path:
  #      - services/pacs_pretend_external/docker-compose.yml
  #    project_directory: services/pacs_pretend_external
  # digitaltwins-api
  - path:
      - services/api/digitaltwins-api/docker-compose.yml
    project_directory: services/api/digitaltwins-api
  #  # JupyterLab
  #  - path:
  #      - services/jupyterlab/docker-compose.yml
  #    project_directory: services/jupyterlab
  # JupyterHub
  - path:
      - services/jupyterhub/docker-compose.yml
    project_directory: services/jupyterhub

volumes:
  portal_datasets:
    driver: local
    name: ${PROJECT_NAME}_portal_datasets
  portal_workspace:
    driver: local
    name: ${PROJECT_NAME}_portal_workspace
  plugin_database:
    driver: local
    name: ${PROJECT_NAME}_plugin_database
  hapi_fhir_postgres:
    driver: local
    name: ${PROJECT_NAME}_hapi_fhir_postgres
  nginx_plugin_configs:
    driver: local
    name: ${PROJECT_NAME}_nginx_plugin_configs

networks:
  digitaltwins-platform:
    driver: bridge
    name: ${PROJECT_NAME}

# create networks if not exists
# sudo docker network create digitaltwins-platform
