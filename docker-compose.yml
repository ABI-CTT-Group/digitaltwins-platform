services:
  portal-backend:
    extends:
      file: ./services/portal/DigitalTWINS-Portal/docker-compose.yml
      service: portal-backend
    restart: unless-stopped
    networks:
      - digitaltwins-platform
  portal-frontend:
    extends:
      file: ./services/portal/DigitalTWINS-Portal/docker-compose.yml
      service: portal-frontend
    restart: unless-stopped
    networks:
      - digitaltwins-platform
  hapi-fhir:
    extends:
      file: ./services/hapi-fhir/docker-compose.yml
      service: hapi-fhir
    restart: unless-stopped
    networks:
      - digitaltwins-platform
  hapi-fhir-postgres:
    extends:
      file: ./services/hapi-fhir/docker-compose.yml
      service: hapi-fhir-postgres
    restart: unless-stopped
    networks:
      - digitaltwins-platform

include:
  # to run only a specific included project with the root .env: sudo docker compose -f services/<service_name>/docker-compose.yml --env-file ./.env up

  # Keycloak
  - path:
      - services/keycloak/docker-compose.yml
    project_directory: services/keycloak
  # postgres
  - path:
      - services/postgres/docker-compose.yml
    project_directory: services/postgres
  # Airflow
  - path:
      - services/airflow/docker-compose.yml
      - services/airflow/network-override.yml
    project_directory: services/airflow
  # SEEK
  - path:
      - services/seek/ldh-deployment/docker-compose.yml
      - services/seek/network-override.yml
    project_directory: services/seek/ldh-deployment
  # MinIO
  - path:
      - services/minio/docker-compose.yml
    project_directory: services/minio
  # PACS (Orthanc)
  - path:
      - services/pacs/docker-compose.yml
    project_directory: services/pacs
  #  # TODO. disable for production. External PACS (pretend to be external). only for testing
  #  - path:
  #      - services/pacs_pretend_external/docker-compose.yml
  #    project_directory: services/pacs_pretend_external
  # digitaltwins-api
  - path:
      - services/api/digitaltwins-api/docker-compose.yml
    project_directory: services/api/digitaltwins-api
  #  # JupyterLab
  #  - path:
  #      - services/jupyterlab/docker-compose.yml
  #    project_directory: services/jupyterlab
  # JupyterHub
  - path:
      - services/jupyterhub/docker-compose.yml
    project_directory: services/jupyterhub

volumes:
  portal_datasets:
    driver: local
    name: ${PROJECT_NAME}_portal_datasets
  portal_workspace:
    driver: local
    name: ${PROJECT_NAME}_portal_workspace
  plugin_database:
    driver: local
    name: ${PROJECT_NAME}_plugin_database
  hapi_fhir_postgres:
    driver: local
    name: ${PROJECT_NAME}_hapi_fhir_postgres
  nginx_plugin_configs:
    driver: local
    name: ${PROJECT_NAME}_nginx_plugin_configs

networks:
  digitaltwins-platform:
    driver: bridge
    name: ${PROJECT_NAME}

# create networks if not exists
# sudo docker network create digitaltwins-platform
