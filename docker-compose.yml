services:
  keycloak:
    extends:
      file: ./services/keycloak/docker-compose.yml
      service: keycloak
    restart: unless-stopped
    networks:
      - digitaltwins
  portal-backend:
    extends:
      file: ./services/portal/DigitalTWINS-Portal/docker-compose.yml
      service: portal-backend
    restart: unless-stopped
    networks:
      - digitaltwins
  portal-frontend:
    extends:
      file: ./services/portal/DigitalTWINS-Portal/docker-compose.yml
      service: portal-frontend
    restart: unless-stopped
    networks:
      - digitaltwins
  database:
    extends:
      file: ./services/postgres/docker-compose.yml
      service: database
    restart: unless-stopped
    networks:
      - digitaltwins
  pgadmin: #optional. web interface for postgres
    extends:
      file: ./services/postgres/docker-compose.yml
      service: pgadmin
    restart: unless-stopped
    depends_on:
      - database
    networks:
      - digitaltwins
  digitaltwins-api:
    extends:
      file: ./services/api/digitaltwins-api/docker-compose.yml
      service: digitaltwins-api
    restart: unless-stopped
    depends_on:
      - keycloak
    networks:
      - digitaltwins

  jupyterlab:
    extends:
      file: ./services/jupyterlab/docker-compose.yml
      service: jupyterlab
    restart: unless-stopped
    networks:
      - digitaltwins

